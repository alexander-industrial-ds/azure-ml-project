# =============================================================================
#  CONDA ENVIRONMENT — Project Training Environment
#  Used by: scripts/register_environment.py (called from setup.sh Step 10)
#  Referenced in jobs as: azureml:project-training-env:1
#
#  Pin ALL versions to ensure reproducibility across runs.
#  Upgrade versions → increment environment version in register_environment.py
# =============================================================================

name: project-training-env
channels:
  - defaults
  - conda-forge

dependencies:
  - python=3.10
  - pip:
      # ── Azure ML SDK v2 ───────────────────────────────────────────────────
      - azure-ai-ml==1.12.0
      - azure-identity==1.15.0

      # ── MLflow (pin both — version mismatch causes ArtifactRepository error)
      - mlflow==2.22.0
      - azureml-mlflow==1.51.0

      # ── ML stack ─────────────────────────────────────────────────────────
      - scikit-learn==1.3.2
      - pandas==2.1.4
      - numpy==1.26.4
      - matplotlib==3.8.2
      - seaborn==0.13.2

      # ── Data / utilities ──────────────────────────────────────────────────
      - mltable==1.6.0
      - pyarrow==14.0.2
      - openpyxl==3.1.2
